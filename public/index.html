<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f0e8" />
  <title>Asia Trip 2026</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Asia Trip" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,560;9..144,600&family=Inter:wght@400;500;600;650;700&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="appbar">
      <div class="appbar-row">
        <h1 id="trip-title">Asia Trip 2026</h1>
        <span id="trip-sub" class="sub"></span>
      </div>
      <div id="city-strip" class="city-strip"></div>
    </header>

    <!-- Breadcrumbs -->
    <nav id="crumbs" class="crumbs" aria-label="Breadcrumb"></nav>

    <!-- Views -->
    <main id="view-itinerary" class="view active"></main>
    <main id="view-day" class="view"></main>
    <main id="view-map" class="view">
      <div id="map"></div>
    </main>

    <!-- Bottom nav -->
    <nav class="tabbar">
      <button class="tab active" data-view="itinerary">🗓️<span>Itinerary</span></button>
      <button class="tab" data-view="map">🗺️<span>Map</span></button>
    </nav>
  </div>

  <!-- Recommend sheet -->
  <div id="sheet" class="sheet hidden">
    <div class="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-head">
        <strong id="sheet-title">Recommendations</strong>
        <button id="sheet-close" class="icon-btn">✕</button>
      </div>
      <div id="sheet-body" class="sheet-body"></div>
    </div>
  </div>

  <!-- Image lightbox -->
  <div id="lightbox" class="lightbox hidden" aria-modal="true" role="dialog">
    <div class="lb-backdrop"></div>
    <button id="lb-close" class="lb-close" aria-label="Close">✕</button>
    <button id="lb-prev" class="lb-nav prev" aria-label="Previous">‹</button>
    <div id="lb-track" class="lb-track"></div>
    <button id="lb-next" class="lb-nav next" aria-label="Next">›</button>
    <div id="lb-count" class="lb-count"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="recommendations.js"></script>
  <script src="app.js"></script>
</body>
</html>
